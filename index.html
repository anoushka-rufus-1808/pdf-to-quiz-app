<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Assistant: Quiz & Podcast</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --podcast-btn: #10b981;
            --podcast-btn-hover: #059669;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #0f172a;
            --border: #e2e8f0;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            max-width: 800px; 
            margin: 0 auto; 
            padding: 40px 20px; 
            line-height: 1.5;
        }

        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { margin: 0 0 10px 0; font-size: 2.5rem; color: var(--text); }
        .header p { margin: 0; color: #64748b; }

        .upload-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            margin-bottom: 30px;
            border: 1px solid var(--border);
        }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; }
        
        input[type="file"], input[type="number"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .button-group { display: flex; gap: 15px; margin-top: 10px; }
        
        button { 
            flex: 1;
            padding: 12px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 6px; 
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: var(--primary-hover); }
        button:disabled { background: #94a3b8 !important; cursor: not-allowed; }
        
        .btn-podcast { background: var(--podcast-btn); }
        .btn-podcast:hover { background: var(--podcast-btn-hover); }

        /* Progress Tracker Styles */
        .steps-container {
            margin: 20px 0;
            text-align: left;
            display: none;
            background: #f1f5f9;
            padding: 15px;
            border-radius: 8px;
        }
        .step {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            color: #94a3b8;
            transition: color 0.3s;
        }
        .step.active { color: var(--primary); font-weight: 600; }
        .step.completed { color: #10b981; }

        .dot {
            height: 12px; width: 12px;
            background-color: #cbd5e1;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
        }
        .active .dot { background-color: var(--primary); animation: pulse 1.5s infinite; }
        .completed .dot { background-color: #10b981; }

        @keyframes pulse {
            0% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 8px rgba(37, 99, 235, 0); }
            100% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); }
        }

        /* Dashboard & History Styles */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-card span { display: block; font-size: 1.5rem; font-weight: bold; color: var(--primary); }
        .stat-card label { font-size: 0.8rem; color: #64748b; }

        .history-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }
        .history-item {
            background: #f1f5f9;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .history-item:hover { background: #e2e8f0; }

        /* Quiz Logic UI - HIDDEN BY DEFAULT */
        .answer-box {
            margin-top: 15px; padding: 15px; background: #f0fdf4;
            border-left: 4px solid #10b981; border-radius: 4px; 
            display: none; 
        }
        .option-label {
            display: block; padding: 12px 15px; margin-bottom: 8px;
            border: 1px solid var(--border); border-radius: 6px; cursor: pointer;
        }
        .option-label.correct { background: #d1fae5; border-color: #10b981; font-weight: 600; }
        .option-label.incorrect { background: #fee2e2; border-color: #ef4444; }

        #statusMsg { text-align: center; font-weight: 500; margin-top: 15px; color: var(--primary); }
        .output-container { display: none; margin-bottom: 30px; }
        .content-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 4px rgb(0 0 0 / 0.05);
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Study Material Copilot</h1>
        <p>Interactive AI Quizzes & Educational Podcasts</p>
    </div>

    <div class="upload-card">
        <div class="form-group">
            <label for="pdfFile">1. Upload Document (PDF)</label>
            <input type="file" id="pdfFile" accept="application/pdf">
        </div>
        
        <div class="form-group">
            <label for="language">2. Select Language</label>
            <select id="language">
                <option value="English">English</option>
                <option value="Hindi">Hindi</option>
            </select>
        </div>

        <div style="display: flex; gap: 20px; margin-bottom: 20px;">
            <div style="flex: 1;">
                <label for="numQuestions">Questions</label>
                <input type="number" id="numQuestions" min="1" max="20" value="5">
            </div>
            <div style="flex: 1;">
                <label for="podcastDuration">Podcast (Mins)</label>
                <input type="number" id="podcastDuration" min="2" max="10" value="3">
            </div>
        </div>
        
        <div class="button-group">
            <button id="generateQuizBtn" onclick="generateQuiz()">Generate Quiz</button>
            <button id="generatePodcastBtn" class="btn-podcast" onclick="generatePodcast()">Generate Podcast</button>
        </div>

        <div id="statusArea">
            <div id="statusMsg"></div>
            <div id="stepsContainer" class="steps-container">
                <div id="step1" class="step"><span class="dot"></span> 📄 Reading PDF...</div>
                <div id="step2" class="step"><span class="dot"></span> 🧠 AI Processing...</div>
                <div id="step3" class="step"><span class="dot"></span> 🎙️ Generating Media...</div>
            </div>
        </div>

        <div id="historySection" class="history-section" style="display: none;">
            <h3 style="margin:0 0 15px 0; font-size: 1.1rem;">📊 Study Dashboard</h3>
            <div id="historyList"></div>
        </div>
    </div>

    <div id="podcastContainer" class="output-container">
        <div class="content-card">
            <h2>🎙️ AI Podcast</h2>
            <audio id="audioPlayer" controls style="width: 100%; margin-bottom: 20px;"></audio>
            <div style="background: #f8fafc; padding: 15px; border-radius: 6px; border: 1px solid var(--border);">
                <strong>Podcast Script:</strong>
                <p id="podcastScript" style="white-space: pre-wrap; font-size: 0.95rem;"></p>
            </div>
        </div>
    </div>

    <div id="quizContainer" class="output-container">
        <div id="quizStats" class="dashboard-grid" style="display: none;">
            <div class="stat-card"><span id="statScore">0/0</span><label>Last Score</label></div>
            <div class="stat-card"><span id="statPercent">0%</span><label>Accuracy</label></div>
        </div>
        <div class="card-header">
            <h2 id="quizTitle" style="margin:0;">Quiz</h2>
            <button class="btn-secondary" id="submitQuizBtn" onclick="submitQuiz()" style="padding: 10px 20px; background: #475569; color:white; border:none; border-radius:6px; cursor:pointer;">Submit Quiz</button>
        </div>
        <div id="questionsList"></div>
    </div>

    <script>
        let currentQuizData = null;

        window.onload = renderHistory;

        function setUIState(isLoading, loadingMessage = "") {
            document.getElementById('generateQuizBtn').disabled = isLoading;
            document.getElementById('generatePodcastBtn').disabled = isLoading;
            document.getElementById('statusMsg').innerText = loadingMessage;
            if (isLoading) {
                document.getElementById('quizContainer').style.display = 'none';
                document.getElementById('podcastContainer').style.display = 'none';
            }
        }

        function saveResult(type, title, score = null, total = null, audioUrl = null, script = null) {
            let history = JSON.parse(localStorage.getItem('studyHistory') || '[]');
            const entry = {
                id: Date.now(),
                date: new Date().toLocaleString(),
                type, title, score, total, audioUrl, script
            };
            history.unshift(entry);
            localStorage.setItem('studyHistory', JSON.stringify(history.slice(0, 10)));
            renderHistory();
        }

        function renderHistory() {
            const history = JSON.parse(localStorage.getItem('studyHistory') || '[]');
            const container = document.getElementById('historySection');
            const list = document.getElementById('historyList');
            if (history.length === 0) { container.style.display = 'none'; return; }
            container.style.display = 'block';
            list.innerHTML = history.map(item => `
                <div class="history-item" onclick="loadHistoryItem(${item.id})">
                    <span>${item.type === 'quiz' ? '📝 Quiz' : '🎙️ Podcast'}: ${item.title.substring(0,30)}...</span>
                    <strong>${item.score !== null ? item.score + '/' + item.total : 'Play'}</strong>
                </div>
            `).join('');
        }

        function loadHistoryItem(id) {
            const history = JSON.parse(localStorage.getItem('studyHistory') || '[]');
            const item = history.find(i => i.id === id);
            if (item && item.type === 'podcast') {
                document.getElementById('podcastScript').innerText = item.script;
                const player = document.getElementById('audioPlayer');
                player.src = item.audioUrl;
                player.load();
                document.getElementById('podcastContainer').style.display = 'block';
                window.scrollTo({ top: document.getElementById('podcastContainer').offsetTop - 20, behavior: 'smooth' });
            }
        }

        async function generateQuiz() {
            const file = document.getElementById('pdfFile').files[0];
            if (!file) { alert("Please upload a PDF first."); return; }
            setUIState(true, "Generating quiz...");
            const formData = new FormData();
            formData.append('file', file);
            formData.append('language', document.getElementById('language').value);
            formData.append('num_questions', document.getElementById('numQuestions').value);

            try {
                const res = await fetch('/api/v1/generate-quiz', { method: 'POST', body: formData });
                const result = await res.json();
                if (res.ok) {
                    currentQuizData = result.data;
                    renderQuizUI(result.data);
                    document.getElementById('quizContainer').style.display = 'block';
                    document.getElementById('quizStats').style.display = 'none';
                    setUIState(false, "✅ Quiz Loaded");
                }
            } catch (e) { setUIState(false, "Error loading quiz"); }
        }

        function renderQuizUI(data) {
            document.getElementById('quizTitle').innerText = data.quiz_title;
            const list = document.getElementById('questionsList');
            list.innerHTML = '';
            data.questions.forEach((q, i) => {
                const card = document.createElement('div');
                card.className = 'content-card';
                let options = '';
                for (const [key, val] of Object.entries(q.options)) {
                    options += `<label class="option-label"><input type="radio" name="q${i}" value="${key}"> ${key}: ${val}</label>`;
                }
                card.innerHTML = `
                    <p><strong>${i+1}. ${q.question_text}</strong></p>
                    <div class="options-container">${options}</div>
                    <div class="answer-box" id="ans${i}">
                        <strong style="color: #065f46;">Correct Answer: ${q.correct_answer}</strong>
                        <p style="margin-top: 5px;">${q.explanation}</p>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function submitQuiz() {
            let score = 0;
            const total = currentQuizData.questions.length;
            currentQuizData.questions.forEach((q, i) => {
                const selected = document.querySelector(`input[name="q${i}"]:checked`);
                const box = document.getElementById(`ans${i}`);
                box.style.display = 'block';
                const labels = document.querySelectorAll(`input[name="q${i}"]`);
                labels.forEach(input => {
                    const label = input.parentElement;
                    label.classList.remove('correct', 'incorrect');
                    if (input.value === q.correct_answer) label.classList.add('correct');
                    if (selected && input === selected && input.value !== q.correct_answer) label.classList.add('incorrect');
                });
                if (selected && selected.value === q.correct_answer) score++;
            });
            document.getElementById('quizStats').style.display = 'grid';
            document.getElementById('statScore').innerText = `${score}/${total}`;
            document.getElementById('statPercent').innerText = `${Math.round((score/total)*100)}%`;
            saveResult('quiz', currentQuizData.quiz_title, score, total);
            window.scrollTo({ top: document.getElementById('quizStats').offsetTop - 20, behavior: 'smooth' });
        }

        async function generatePodcast() {
            const file = document.getElementById('pdfFile').files[0];
            if (!file) { alert("Please upload a PDF first."); return; }
            
            setUIState(true, "");
            const steps = document.getElementById('stepsContainer');
            steps.style.display = 'block';
            
            const s1 = document.getElementById('step1'); 
            const s2 = document.getElementById('step2'); 
            const s3 = document.getElementById('step3'); 
            
            [s1, s2, s3].forEach(s => s.className = 'step');
            s1.classList.add('active');

            const formData = new FormData();
            formData.append('file', file);
            formData.append('language', document.getElementById('language').value);
            formData.append('duration', document.getElementById('podcastDuration').value);

            try {
                // Advance to Step 2 after a simulated reading time
                setTimeout(() => {
                    if (s1.classList.contains('active')) {
                        s1.classList.replace('active', 'completed');
                        s2.classList.add('active');
                    }
                }, 2500);

                const res = await fetch('/api/v1/generate-podcast', { method: 'POST', body: formData });
                
                // Advance to Step 3 when response arrives
                s2.classList.replace('active', 'completed');
                s3.classList.add('active');

                const result = await res.json();
                
                if (res.ok) {
                    s3.classList.replace('active', 'completed');
                    
                    document.getElementById('podcastScript').innerText = result.script;
                    const player = document.getElementById('audioPlayer');
                    player.src = result.audio_url;
                    player.load();
                    
                    document.getElementById('podcastContainer').style.display = 'block';
                    saveResult('podcast', 'Podcast Summary', null, null, result.audio_url, result.script);
                    
                    setTimeout(() => {
                        steps.style.display = 'none';
                        setUIState(false, "✅ Podcast Ready");
                    }, 1500);
                } else {
                    throw new Error(result.detail || "Generation failed");
                }
            } catch (e) {
                setUIState(false, "❌ Error: " + e.message);
                steps.style.display = 'none';
            }
        }
    </script>
</body>
</html>
